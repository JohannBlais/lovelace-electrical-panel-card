<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" preserveAspectRatio="xMidYMid meet" font-family="Arial, sans-serif">
  <style>
    .bubble-bg { fill: #ffffff; stroke: #e2e8f0; stroke-width: 0.7; }
    .bubble-conn { stroke: #cbd5e0; stroke-width: 0.5; }
    .pwr-value { font-size: 7.5px; font-weight: bold; }
    .label-secondary { font-size: 7.5px; fill: #718096; }
    .room-text { font-size: 8px; fill: #4a5568; }
    .floor-pill-text { font-size: 7px; font-weight: bold; fill: #ffffff; }
    .breaker-id { font-size: 9px; font-weight: bold; }
    .phase-label { font-size: 7.5px; font-weight: bold; fill: #1a202c; }
  </style>

  <rect x="0" y="0" width="440" height="360" fill="#fafafa"/>

  <!-- Phase trunks (longer to reach all groups) -->
  <line x1="24" y1="20" x2="24" y2="320" stroke="#5A6474" stroke-width="3"/>
  <line x1="36" y1="20" x2="36" y2="320" stroke="#1A202C" stroke-width="3"/>
  <line x1="48" y1="20" x2="48" y2="320" stroke="#8B4513" stroke-width="3"/>

  <!-- Phase labels -->
  <text x="24" y="16" text-anchor="middle" class="phase-label">L3</text>
  <text x="36" y="16" text-anchor="middle" class="phase-label">L2</text>
  <text x="48" y="16" text-anchor="middle" class="phase-label">L1</text>

  <!-- Staggered phase tap bubbles with connector + bg -->
  <circle cx="48" cy="26" r="2" fill="#8B4513"/>
  <line class="bubble-conn" x1="48" y1="22" x2="116" y2="22"/>
  <rect class="bubble-bg" x="116" y="14" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="148" y="25" text-anchor="end" fill="#1a202c">1.4 kW</text>

  <circle cx="36" cy="46" r="2" fill="#1A202C"/>
  <line class="bubble-conn" x1="36" y1="42" x2="151" y2="42"/>
  <rect class="bubble-bg" x="151" y="34" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="183" y="45" text-anchor="end" fill="#1a202c">820 W</text>

  <circle cx="24" cy="66" r="2" fill="#5A6474"/>
  <line class="bubble-conn" x1="24" y1="62" x2="186" y2="62"/>
  <rect class="bubble-bg" x="186" y="54" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="218" y="65" text-anchor="end" fill="#1a202c">1.1 kW</text>

  <!-- Right column: Total / Grid -->
  <text class="label-secondary" x="295" y="29" text-anchor="end">Total</text>
  <rect class="bubble-bg" x="318" y="18" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="350" y="29" text-anchor="end" fill="#c53030">3.4 kW</text>

  <text class="label-secondary" x="295" y="49" text-anchor="end">Grid</text>
  <rect class="bubble-bg" x="318" y="38" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="350" y="49" text-anchor="end" fill="#718096">1.2 kW</text>

  <!-- ── D1 group (L3, green) ────────────────────────────────────────────── -->
  <circle cx="24" cy="100" r="3.5" fill="#38a169"/>
  <line x1="24" y1="100" x2="70" y2="100" stroke="#38a169" stroke-width="2"/>
  <rect x="70" y="88" width="24" height="24" fill="#dff5e6" stroke="#38a169" stroke-width="1.8" rx="2"/>
  <text class="breaker-id" x="82" y="104" text-anchor="middle" fill="#38a169">D1</text>

  <!-- Sub-bus down -->
  <line x1="82" y1="112" x2="82" y2="170" stroke="#38a169" stroke-width="3"/>

  <!-- Circuit A (socket) -->
  <line x1="82" y1="130" x2="104" y2="130" stroke="#38a169" stroke-width="3"/>
  <rect x="104" y="120" width="20" height="20" fill="#dff5e6" stroke="#38a169" stroke-width="1.8" rx="2"/>
  <text class="breaker-id" x="114" y="134" text-anchor="middle" fill="#38a169">A</text>
  <line x1="114" y1="146" x2="132" y2="146" stroke="#38a169" stroke-width="0.8"/>
  <!-- Floor pill L1 -->
  <rect x="132" y="140" width="20" height="12" fill="#3182ce" rx="3"/>
  <text class="floor-pill-text" x="142" y="146.5" text-anchor="middle" dominant-baseline="middle">L1</text>
  <!-- Icon: socket (plug shape) -->
  <g transform="translate(156 140) scale(0.5)" fill="#718096">
    <path d="M14,4 L10,4 L10,2 L9,2 L9,4 L7,4 L7,2 L6,2 L6,4 L2,4 C0.9,4 0,4.9 0,6 L0,9 C0,10.7 1.3,12 3,12 L4,12 L4,18 L12,18 L12,12 L13,12 C14.7,12 16,10.7 16,9 L16,6 C16,4.9 15.1,4 14,4 Z"/>
  </g>
  <text class="room-text" x="172" y="146.5" dominant-baseline="middle">Washing machine</text>
  <!-- Bubble + connector + toggle -->
  <line class="bubble-conn" x1="270" y1="146" x2="318" y2="146"/>
  <rect class="bubble-bg" x="318" y="138" width="55" height="14" rx="3"/>
  <text class="pwr-value" x="350" y="148.5" text-anchor="end" fill="#38a169">540 W</text>
  <rect x="354" y="143" width="14" height="8" fill="#38a169" rx="4"/>
  <circle cx="364.5" cy="147" r="3" fill="white"/>

  <!-- Circuit B (light) -->
  <line x1="82" y1="170" x2="104" y2="170" stroke="#38a169" stroke-width="3"/>
  <rect x="104" y="160" width="20" height="20" fill="#dff5e6" stroke="#38a169" stroke-width="1.8" rx="2"/>
  <text class="breaker-id" x="114" y="174" text-anchor="middle" fill="#38a169">B</text>
  <line x1="114" y1="186" x2="132" y2="186" stroke="#38a169" stroke-width="0.8"/>
  <!-- Floor pill L0 (green) -->
  <rect x="132" y="180" width="20" height="12" fill="#38a169" rx="3"/>
  <text class="floor-pill-text" x="142" y="186.5" text-anchor="middle" dominant-baseline="middle">L0</text>
  <!-- Icon: light bulb -->
  <g transform="translate(156 180) scale(0.5)" fill="#718096">
    <path d="M9,2 C5.7,2 3,4.7 3,8 C3,10.4 4.4,12.4 6.4,13.4 L6.4,15 C6.4,15.6 6.8,16 7.4,16 L10.6,16 C11.2,16 11.6,15.6 11.6,15 L11.6,13.4 C13.6,12.4 15,10.4 15,8 C15,4.7 12.3,2 9,2 Z M7,17 L11,17 L11,18 L7,18 L7,17 Z"/>
  </g>
  <text class="room-text" x="172" y="186.5" dominant-baseline="middle">Living room lights</text>
  <line class="bubble-conn" x1="270" y1="186" x2="328" y2="186"/>
  <rect class="bubble-bg" x="328" y="178" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="350" y="188.5" text-anchor="end" fill="#38a169">120 W</text>

  <!-- ── D5 group (3-phase, purple) ─────────────────────────────────────── -->
  <circle cx="24" cy="225" r="3.5" fill="#805ad5"/>
  <circle cx="36" cy="225" r="3.5" fill="#805ad5"/>
  <circle cx="48" cy="225" r="3.5" fill="#805ad5"/>
  <line x1="24" y1="225" x2="70" y2="225" stroke="#805ad5" stroke-width="2"/>
  <rect x="70" y="213" width="24" height="24" fill="#ece4f8" stroke="#805ad5" stroke-width="1.8" rx="2"/>
  <text class="breaker-id" x="82" y="229" text-anchor="middle" fill="#805ad5">D5</text>

  <!-- Sub-bus -->
  <line x1="82" y1="237" x2="82" y2="255" stroke="#805ad5" stroke-width="3"/>

  <!-- Circuit HP (heat pump, 4P) -->
  <line x1="82" y1="255" x2="104" y2="255" stroke="#805ad5" stroke-width="3"/>
  <rect x="104" y="245" width="20" height="20" fill="#ece4f8" stroke="#805ad5" stroke-width="1.8" rx="2"/>
  <text class="breaker-id" x="114" y="259" text-anchor="middle" fill="#805ad5">HP</text>
  <line x1="114" y1="271" x2="132" y2="271" stroke="#805ad5" stroke-width="0.8"/>
  <rect x="132" y="265" width="20" height="12" fill="#38a169" rx="3"/>
  <text class="floor-pill-text" x="142" y="271.5" text-anchor="middle" dominant-baseline="middle">L0</text>
  <!-- Icon: power (gear-ish — simple cog) -->
  <g transform="translate(156 265) scale(0.5)" fill="#718096">
    <circle cx="9" cy="9" r="3" fill="none" stroke="#718096" stroke-width="1.5"/>
    <path d="M9,2 L9,4 M9,14 L9,16 M2,9 L4,9 M14,9 L16,9 M4,4 L5.5,5.5 M12.5,12.5 L14,14 M4,14 L5.5,12.5 M12.5,5.5 L14,4" stroke="#718096" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <text class="room-text" x="172" y="271.5" dominant-baseline="middle">Heat pump</text>
  <line class="bubble-conn" x1="270" y1="271" x2="328" y2="271"/>
  <rect class="bubble-bg" x="328" y="263" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="350" y="273.5" text-anchor="end" fill="#805ad5">2.1 kW</text>

  <!-- ── PV group (solar, orange) ───────────────────────────────────────── -->
  <circle cx="24" cy="305" r="3.5" fill="#d97706"/>
  <circle cx="36" cy="305" r="3.5" fill="#d97706"/>
  <circle cx="48" cy="305" r="3.5" fill="#d97706"/>
  <line x1="24" y1="305" x2="70" y2="305" stroke="#d97706" stroke-width="2"/>
  <polygon points="19,319 24,307 29,319" fill="#d97706"/>
  <rect x="70" y="293" width="24" height="24" fill="#fde9c8" stroke="#d97706" stroke-width="1.8" rx="2"/>
  <text class="breaker-id" x="82" y="309" text-anchor="middle" fill="#d97706">PV</text>
  <!-- PV bubble with saturation gauge -->
  <line class="bubble-conn" x1="94" y1="305" x2="328" y2="305"/>
  <rect class="bubble-bg" x="328" y="297" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="350" y="307.5" text-anchor="end" fill="#1a202c">−4.2 kW</text>
  <rect x="320" y="312" width="30" height="2" rx="1" fill="#e2e8f0" opacity="0.5"/>
  <rect x="320" y="312" width="15.6" height="2" rx="1" fill="#d97706"/>

  <!-- Sub-bus + INV circuit -->
  <line x1="82" y1="317" x2="82" y2="345" stroke="#d97706" stroke-width="3"/>
  <line x1="82" y1="345" x2="104" y2="345" stroke="#d97706" stroke-width="3"/>
  <rect x="104" y="335" width="20" height="20" fill="#fde9c8" stroke="#d97706" stroke-width="1.8" rx="2"/>
  <text class="breaker-id" x="114" y="349" text-anchor="middle" fill="#d97706">INV</text>
  <line x1="114" y1="361" x2="132" y2="361" stroke="#d97706" stroke-width="0.8"/>
  <rect x="132" y="355" width="20" height="12" fill="#c2410c" rx="3"/>
  <text class="floor-pill-text" x="142" y="361.5" text-anchor="middle" dominant-baseline="middle">TO</text>
  <!-- Icon: solar power (sun-ish) -->
  <g transform="translate(156 355) scale(0.5)" fill="#718096">
    <circle cx="9" cy="9" r="3"/>
    <path d="M9,1 L9,3 M9,15 L9,17 M1,9 L3,9 M15,9 L17,9 M3.3,3.3 L4.7,4.7 M13.3,13.3 L14.7,14.7 M3.3,14.7 L4.7,13.3 M13.3,4.7 L14.7,3.3" stroke="#718096" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text class="room-text" x="172" y="361.5" dominant-baseline="middle">Microinverter #1</text>
  <line class="bubble-conn" x1="270" y1="361" x2="328" y2="361"/>
  <rect class="bubble-bg" x="328" y="353" width="35" height="14" rx="3"/>
  <text class="pwr-value" x="350" y="363.5" text-anchor="end" fill="#1a202c">220 W</text>
</svg>
