# ─────────────────────────────────────────────────────────────────────────────
# Example 3 — Three-phase residential panel (no production)
#
# A typical European three-phase installation:
#  - Three single-phase RCDs (D1/D2/D3) distributed across L1, L2, L3
#    for load balancing
#  - One three-phase RCD (D4) feeding three-phase loads (heat pump, induction
#    cooktop) — `phases: [L1, L2, L3]` taps all three trunks
#  - Per-phase "phases" sensors at the top of the card showing the live load
#    on each trunk
#
# Compare with example 02: the only structural addition is `sensors.phases.*`
# and the three-phase group `D4`.
# ─────────────────────────────────────────────────────────────────────────────
type: custom:electrical-panel-card
title: Three-phase home panel

sensors:
  total: { entity: sensor.house_total_power }
  grid:  { entity: sensor.grid_net_power }
  phases:
    l1: { entity: sensor.phase_l1_power }
    l2: { entity: sensor.phase_l2_power }
    l3: { entity: sensor.phase_l3_power }

floors:
  LB: { bg: '#718096', fg: white }   # Lower basement
  L0: { bg: '#38a169', fg: white }   # Ground floor
  L1: { bg: '#3182ce', fg: white }   # First floor

groups:
  - id: D1
    phases: [L1]
    accent: '#3182ce'
    amp: 40
    mA: 30
    poles: 2
    class: A
    circuits:
      - id: A
        type: socket
        amp: 16
        poles: 2
        mm2: 2.5
        zones:
          - { floor: L0, room: Office }
          - { floor: L0, room: Living room }
      - id: B
        type: light
        amp: 10
        poles: 2
        mm2: 1.5
        zones:
          - { floor: L0, room: Office }
          - { floor: L0, room: Hallway }

  - id: D2
    phases: [L2]
    accent: '#d69e2e'
    amp: 40
    mA: 30
    poles: 2
    class: A
    circuits:
      - id: C
        type: socket
        amp: 16
        poles: 2
        mm2: 2.5
        zones:
          - { floor: L0, room: Kitchen }
          - { floor: L1, room: Bedroom }
      - id: D
        type: socket
        amp: 16
        poles: 2
        mm2: 2.5
        zones:
          - { floor: L1, room: Bathroom }
          - { floor: L1, room: WC }

  - id: D3
    phases: [L3]
    accent: '#38a169'
    amp: 40
    mA: 30
    poles: 2
    class: A
    circuits:
      - id: E
        type: light
        amp: 10
        poles: 2
        mm2: 1.5
        zones:
          - { floor: L0, room: Living room }
          - { floor: L0, room: Kitchen }
          - { floor: L1, room: Stairs }
      - id: F
        type: socket
        amp: 16
        poles: 2
        mm2: 2.5
        zones:
          - { floor: LB, room: Basement }

  # Three-phase loads: dedicated 4-pole RCD covering 4-pole breakers.
  - id: D4
    phases: [L1, L2, L3]
    accent: '#805ad5'
    amp: 40
    mA: 30
    poles: 4
    class: A
    circuits:
      - id: HP
        type: power
        amp: 20
        poles: 4
        mm2: 6
        sensor: sensor.heat_pump_power
        zones:
          - { floor: L0, room: Heat pump, icon: mdi:heat-pump }
      - id: CT
        type: power
        amp: 20
        poles: 4
        mm2: 6
        sensor: sensor.cooktop_power
        zones:
          - { floor: L0, room: Induction cooktop, icon: mdi:stove }
